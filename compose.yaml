services:
  forgemap3d:
    build:
      context: .
      dockerfile: Dockerfile
    image: forgemap3d:latest
    ports:
      - "3013:3000"
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: "3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
